on:
  push:
    branches:
      - master
      - gh-actions-test # For testing purpose

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test

  docker-java:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - stream
          - merge
          - batch
    env:
      IMAGE_TAG: public.ecr.aws/cookpad/prism-${{ matrix.component }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: corretto
          cache: gradle
      - run: echo ${GITHUB_SHA} > REVISION
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      - uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - run: ./gradlew shared:docker ${{ matrix.component }}:jibDockerBuild -Djib.to.image=${IMAGE_TAG}
      - name: Check Hadoop native library
        run: docker run --entrypoint '' ${IMAGE_TAG} java -cp '/app/resources:/app/classes:/app/libs/*' org.apache.hadoop.util.NativeLibraryChecker -a
      - run: docker push ${IMAGE_TAG}

  docker-ruby:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - run: echo ${GITHUB_SHA} > REVISION
      - uses: docker/setup-buildx-action@v4
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      - uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - uses: docker/build-push-action@v7
        with:
          push: true
          context: ./gc
          tags: public.ecr.aws/cookpad/prism-gc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
