plugins {
    id 'com.palantir.docker' version '0.34.0'
    id 'java-library'
}

dependencies {
    api group: 'org.mybatis.spring.boot', name: 'mybatis-spring-boot-starter', version: '1.3.2'
    api group: 'org.apache.parquet', name: 'parquet-hadoop', version: '1.12.3'
    api group: 'org.apache.hadoop', name: 'hadoop-common', version: '3.3.4'
    api group: 'org.apache.hadoop', name: 'hadoop-mapreduce-client-core', version: '3.3.4'
    api group: 'com.fasterxml.jackson.core', name: 'jackson-core', version: '2.8.7'
    api group: 'com.fasterxml.jackson.core', name: 'jackson-databind', version: '2.8.7'
    api group: 'com.amazonaws', name: 'aws-java-sdk-core', version: '1.11.438'
    api group: 'com.amazonaws', name: 'aws-java-sdk-s3', version: '1.11.438'
    api group: 'com.amazonaws', name: 'aws-java-sdk-sqs', version: '1.11.438'
    api group: 'com.amazonaws', name: 'aws-java-sdk-sns', version: '1.11.438'
    api group: 'javax.activation', name: 'activation', version: '1.1.1'
}

configurations.all {
    exclude module: 'slf4j-log4j12'
    exclude module: 'log4j'
}

docker {
  name 'prism-base'
  dockerfile file('Dockerfile')
}
